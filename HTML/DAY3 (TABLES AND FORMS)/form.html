<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    
    <hr>
    <!-- Youtube -->
    <form action = "https://www.youtube.com/results">
        <div>
            <label for="youtube">Youtube</label>
            <input type = "text" id="youtube" placeholder="Search on youtube" name = "search_query">
            <input type="submit">
        </div> 
    </form>
    <hr>
    <!-- google -->
    <form action="https://www.google.com/search">
        <div>
            <label for="google">Google</label>
            <input type = "text" placeholder="search on google" name = "q" id="google">
            <button>Submit</button>
        </div>
    </form>
    <hr>
    <!-- wikipedia -->
    <form action = "https://en.wikipedia.org/w/index.php">
        <div>
            <label for="wikipedia">wikipedia</label>
            <input type = "text" placeholder="search on wikipedia" name = "search" id="wikipedia">
            <button>Submit</button>
        </div>
    </form>
    <hr>
    <!-- amazon -->
    <form action = "https://www.amazon.in/s">
        <div>
            <label for="amazon">Amazon</label>
            <input type = "text" placeholder="search on Amazon" name = "k" id="amazon">
            <button>Submit</button>
        </div>
    </form>
    <hr>
    <!-- flipkart -->
    <form action = "https://www.flipkart.com/search">
        <div>
            <label for="flipkart">FlipCart</label>
            <input type = "text" placeholder="search on ChatGPT" name = "q" id="flipkart">
            <button>Submit</button>
        </div>
    </form>
    <hr>
    <!-- bing -->
    <form action = "https://www.bing.com/search?">
        <div>
            <label for="bing">Microsoft Bing</label>
            <input type = "text" placeholder="search on Bing" name = "q" id="bing">
            <button>Submit</button>
        </div>
    </form>
    <hr>
    <!-- github -->
    <form action = "https://github.com/search">
        <div>
            <label for="git">GitHub</label>
            <input type = "text" placeholder="search Repo on git" name = "q" id="git">
            <button>Submit</button>
        </div>
    </form>
    <hr>
    <!-- stackoverflow -->
    <form action = "https://stackoverflow.com/search">
        <div>
            <label for="so">StackOverFlow</label>
            <input type = "text" placeholder="search Any Doubt" name = "q" id="so">
            <button>Submit</button>
        </div>
    </form>
    <hr>
    <!-- imbd -->
    <form action = "https://www.imdb.com/find">
        <div>
            <label for="imdb">IMDBs</label>
            <input type = "text" placeholder="know about movies" name = "q" id="imdb">
            <button>Submit</button>
        </div>
    </form>
    <hr>
    <!-- Linkdin -->
    <form action = "https://www.linkedin.com/search/results/all/">
        <div>
            <label for="linkedin">Linkdin</label>
            <input type = "text" placeholder="search on linkedin" name = "keywords" id="linkedin">
            <button>Submit</button>
        </div>
    </form>
    <hr>
</body>
</html>
