<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>feedback form</title>
</head>
<body>
    <h1>FeedBack Form</h1>
    <form action="/server">
        <div>
            <label for="name">Name:</label>
            <input type="text" placeholder="Write your name" name="name" id="name">
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Write your email">
        </div>
        <div>
            <p>Message:</p>
            <textarea name="msg" id="msg" rows="5" cols="30"></textarea>
        </div>
        <p>Rate us out of 5:</p>
        <div>
            <input type="radio" id="1" name="rate" value="1">
            <label for="1">1</label>
        </div>
        <div>
            <input type="radio" id="2" name="rate" value="2">
            <label for="2">2</label>
        </div>
        <div>
            <input type="radio" id="3" name="rate" value="3">
            <label for="3">3</label>
        </div>
        <div>
            <input type="radio" id="4" name="rate" value="4">
            <label for="4">4</label>
        </div>
        <div>
            <input type="radio" id="5" name="rate" value="5">
            <label for="5">5</label>
        </div>
        <br>
        <button>Send your message!</button>
    </form>
</body>
</html>
