<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons and Badges using bootstrap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Buttons using Bootstrap</h1>
    <button type="button" class="btn btn-primary">Primary</button>
    <button type="button" class="btn btn-secondary">Secondary</button>
    <button type="button" class="btn btn-success">Success</button>
    <button type="button" class="btn btn-danger">Danger</button>
    <button type="button" class="btn btn-warning">Warning</button>
    <button type="button" class="btn btn-info">Info</button>
    <button type="button" class="btn btn-light">Light</button>
    <button type="button" class="btn btn-dark">Dark</button>    
    <button type="button" class="btn btn-link">Link</button>
    <br> <br>
    <button type="button" class="btn btn-outline-primary btn-lg">Primary</button>
    <button type="button" class="btn btn-outline-secondary btn-sm">Secondary</button>
    <button type="button" class="btn btn-outline-success">Success</button>
    <button type="button" class="btn btn-outline-danger">Danger</button>
    <button type="button" class="btn btn-outline-warning">Warning</button>
    <button type="button" class="btn btn-outline-info">Info</button>
    <button type="button" class="btn btn-outline-light">Light</button>
    <button type="button" class="btn btn-outline-dark">Dark</button>

    <hr>
    
    <h1>Badges Using Bootstrap</h1>
    <h3>Notifications <span class="badge bg-primary rounded-pill">20+</span></h3>
    <button class="btn btn-primary">
        Followers
        <span class="badge bg-danger rounded-pill">20+</span>
    </button>

    <button type="button" class="btn btn-primary position-relative">
      Inbox
      <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
        99+
        <span class="visually-hidden">unread messages</span>
      </span>
    </button>
    
    <hr>
    
    <h1>Alerts using Bootstrap</h1>
    <div class="alert alert-danger">Download Failed! Please Try Again</div>
    <div class="alert alert-success  alert-dismissible" data-bs-dismiss="alert">
      Congratulations! Your score is 50/50
      <button class="btn-close"></button>
    </div>

    <hr>

    <h1>Button Group Using Bootstrap</h1>
    <div class="btn-group">
      <button class="btn btn-outline-success">one</button>
      <button class="btn btn-outline-success">two</button>
      <button class="btn btn-outline-success">three</button>
    </div>

    <hr>

    <h1>NavBar Using Bootstrap</h1>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
